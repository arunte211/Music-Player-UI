<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Player UI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="player">
  <div class="cover">
    <img src="img.webp" alt="Album Cover">
  </div>

  <div class="info">
    <h2>Blinding Lights</h2>
    <p>The Weeknd</p>
  </div>

  <div class="progress">
    <span>1:12</span>
    <div class="bar">
      <div class="fill"></div>
    </div>
    <span>3:20</span>
  </div>

  <div class="controls">
    <button class="btn">⏮</button>

    <input type="checkbox" id="play">
    <label for="play" class="play-btn"></label>

    <button class="btn">⏭</button>
  </div>

  <div class="volume">
    <span>🔊</span>
    <div class="vol-bar">
      <div class="vol-fill"></div>
    </div>
  </div>
</div>

</body>
</html>
